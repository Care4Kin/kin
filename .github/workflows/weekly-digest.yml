name: Weekly Caregiver Digest

on:
  schedule:
    # Mondays 14:00 UTC (~10am ET)
    - cron: '0 14 * * 1'
  workflow_dispatch: {}

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger digest send
        run: |
          curl -sf -X POST "${{ secrets.KIN_BACKEND_URL }}/api/internal/digests/send" \
            -H "X-Internal-Secret: ${{ secrets.KIN_INTERNAL_SECRET }}"
